name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'
        cache: true

    - run: flutter doctor -v

    - name: Install Android SDK 34
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || echo "SDK 34 already installed or sdkmanager not available"

    - name: Download JS Engines
      run: |
        mkdir -p android/app/src/main/assets
        curl -sLo android/app/src/main/assets/docx-preview.min.js https://unpkg.com/docx-preview@0.1.15/dist/docx-preview.min.js
        curl -sLo android/app/src/main/assets/xlsx.full.min.js https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js

    - name: Install Dependencies
      run: flutter pub get

    - name: Debug Plugin Files
      run: |
        echo "=== .flutter-plugins ==="
        if [ -f .flutter-plugins ]; then cat .flutter-plugins; else echo "(not found)"; fi
        echo ""
        echo "=== .flutter-plugins-dependencies ==="
        if [ -f .flutter-plugins-dependencies ]; then python3 -c "import json,sys; d=json.load(open(sys.argv[1])); [print(f'  {p[\"name\"]}: {p[\"path\"]} (exists: {\"yes\" if __import__(\"os\").path.exists(p[\"path\"]) else \"NO\"})') for p in d.get('plugins',{}).get('android',[])]" .flutter-plugins-dependencies 2>/dev/null || head -30 .flutter-plugins-dependencies; else echo "(not found)"; fi
        echo ""
        echo "=== pub cache paths ==="
        ls ~/.pub-cache/hosted/pub.dev/ 2>/dev/null | grep -E "receive_sharing|shared_pref|pdfx|path_provider|device_info" || echo "(not matching)"
        echo ""
        echo "=== android/ in pub cache ==="
        find ~/.pub-cache -maxdepth 4 -path "*/android/build.gradle" 2>/dev/null | head -10

    - name: Setup Gradle Wrapper
      run: |
        mkdir -p android/gradle/wrapper
        curl -sLo android/gradlew https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew
        curl -sLo android/gradlew.bat https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew.bat
        curl -sLo android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar
        chmod +x android/gradlew
        echo "distributionBase=GRADLE_USER_HOME" > android/gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip" >> android/gradle/wrapper/gradle-wrapper.properties

    - name: Build APK
      id: build
      continue-on-error: true
      shell: bash
      env:
        GRADLE_OPTS: -Dkotlin.build.statistics.enabled=false -Dkotlin.internal.collectFUSMetrics=false
        JAVA_TOOL_OPTIONS: -Dkotlin.internal.collectFUSMetrics=false
      run: |
        flutter build apk --debug 2>&1 | tee build.log
        exit ${PIPESTATUS[0]}

    - name: Extract Errors
      if: steps.build.outcome == 'failure'
      run: |
        {
          echo "### Build Errors"
          echo '```'
          grep -i -E "FAILURE:|BUILD FAILED|A failure occurred|Could not isolate|Plugin project|afterEvaluate|Unzipping|Error:" build.log 2>/dev/null | head -50
          echo ''
          echo '--- tail 80 lines ---'
          tail -80 build.log 2>/dev/null
          echo '```'
        } >> $GITHUB_STEP_SUMMARY
        echo "::group::Full Build Log"
        cat build.log
        echo "::endgroup::"

    - name: Upload Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Mark Failed
      if: steps.build.outcome == 'failure'
      run: exit 1

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: CupsPrintClient-Debug-APK
        path: build/app/outputs/flutter-apk/app-debug.apk

    - uses: softprops/action-gh-release@v2
      if: success() && startsWith(github.ref, 'refs/tags/')
      with:
        files: build/app/outputs/flutter-apk/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
