name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'
        cache: true

    - run: flutter doctor -v

    - name: Download JS Engines
      run: |
        mkdir -p android/app/src/main/assets
        curl -sLo android/app/src/main/assets/docx-preview.min.js https://unpkg.com/docx-preview@0.1.15/dist/docx-preview.min.js
        curl -sLo android/app/src/main/assets/xlsx.full.min.js https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js

    - name: Install Dependencies
      run: flutter pub get

    - name: Debug Plugin Files
      run: |
        echo "=== .flutter-plugins ==="
        cat .flutter-plugins || echo "(not found)"
        echo ""
        echo "=== .flutter-plugins-dependencies (head) ==="
        head -20 .flutter-plugins-dependencies || echo "(not found)"
        echo ""
        echo "=== pub cache check ==="
        ls ~/.pub-cache/hosted/pub.dev/ | grep -E "receive_sharing|shared_pref|pdfx|path_provider" || echo "checking alternate paths"
        find ~/.pub-cache -maxdepth 3 -name "receive_sharing_intent*" -type d 2>/dev/null | head -5

    - name: Setup Gradle Wrapper
      run: |
        mkdir -p android/gradle/wrapper
        curl -sLo android/gradlew https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew
        curl -sLo android/gradlew.bat https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew.bat
        curl -sLo android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar
        chmod +x android/gradlew
        echo "distributionBase=GRADLE_USER_HOME" > android/gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip" >> android/gradle/wrapper/gradle-wrapper.properties

    - name: Build APK
      id: build
      continue-on-error: true
      shell: bash
      env:
        GRADLE_OPTS: -Dkotlin.build.statistics.enabled=false
      run: |
        flutter build apk --debug 2>&1 | tee build.log
        exit ${PIPESTATUS[0]}

    - name: Extract Errors
      if: steps.build.outcome == 'failure'
      run: |
        {
          echo "### Build Errors"
          echo '```'
          grep -i -E "FAILURE:|BUILD FAILED|A failure occurred|Could not isolate|Plugin project|afterEvaluate|Unzipping|Error:" build.log 2>/dev/null | head -50
          echo ''
          echo '--- tail 80 lines ---'
          tail -80 build.log 2>/dev/null
          echo '```'
        } >> $GITHUB_STEP_SUMMARY
        echo "::group::Full Build Log"
        cat build.log
        echo "::endgroup::"

    - name: Upload Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Mark Failed
      if: steps.build.outcome == 'failure'
      run: exit 1

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: CupsPrintClient-Debug-APK
        path: build/app/outputs/flutter-apk/app-debug.apk

    - uses: softprops/action-gh-release@v2
      if: success() && startsWith(github.ref, 'refs/tags/')
      with:
        files: build/app/outputs/flutter-apk/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
