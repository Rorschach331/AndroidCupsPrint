name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'
        cache: true

    - run: flutter doctor -v

    - name: Download JS Engines
      run: |
        mkdir -p android/app/src/main/assets
        curl -sLo android/app/src/main/assets/docx-preview.min.js https://unpkg.com/docx-preview@0.1.15/dist/docx-preview.min.js
        curl -sLo android/app/src/main/assets/xlsx.full.min.js https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js

    - run: flutter pub get

    - uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
        restore-keys: gradle-${{ runner.os }}-

    - name: Generate Gradle Wrapper
      run: |
        flutter create --platforms=android _tmp
        cp _tmp/android/gradlew _tmp/android/gradlew.bat android/
        cp -r _tmp/android/gradle/wrapper android/gradle/
        chmod +x android/gradlew
        rm -rf _tmp

    - name: Build APK
      id: build
      continue-on-error: true
      shell: bash
      run: |
        flutter build apk --debug 2>&1 | tee build.log
        exit ${PIPESTATUS[0]}

    - name: Extract Errors
      if: failure()
      run: |
        {
          echo "### \ud83d\udccb Build Errors"
          echo '```'
          grep -i -E "FAILURE:|BUILD FAILED|A failure occurred|Could not isolate" build.log | head -30
          echo ''
          echo '--- tail 80 ---'
          tail -80 build.log
          echo '```'
        } >> $GITHUB_STEP_SUMMARY

    - name: Upload Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Mark Failed
      if: steps.build.outcome == 'failure'
      run: exit 1

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: CupsPrintClient-Debug-APK
        path: build/app/outputs/flutter-apk/app-debug.apk

    - uses: softprops/action-gh-release@v2
      if: success() && startsWith(github.ref, 'refs/tags/')
      with:
        files: build/app/outputs/flutter-apk/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
