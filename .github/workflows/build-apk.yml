name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'
        cache: true

    - run: flutter doctor -v

    - name: Download JS Engines
      run: |
        mkdir -p android/app/src/main/assets
        curl -sLo android/app/src/main/assets/docx-preview.min.js https://unpkg.com/docx-preview@0.1.15/dist/docx-preview.min.js
        curl -sLo android/app/src/main/assets/xlsx.full.min.js https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js

    - name: Install Dependencies
      run: flutter pub get

    - name: Setup Gradle Wrapper
      run: |
        mkdir -p android/gradle/wrapper
        curl -sLo android/gradlew https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradlew
        curl -sLo android/gradlew.bat https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradlew.bat
        curl -sLo android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradle/wrapper/gradle-wrapper.jar
        chmod +x android/gradlew
        echo "distributionBase=GRADLE_USER_HOME" > android/gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.1.1-bin.zip" >> android/gradle/wrapper/gradle-wrapper.properties
        echo "networkTimeout=10000" >> android/gradle/wrapper/gradle-wrapper.properties
        echo "validateDistributionUrl=true" >> android/gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> android/gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties

    - name: Build APK
      id: build
      continue-on-error: true
      shell: bash
      run: |
        flutter build apk --debug 2>&1 | tee build.log
        exit ${PIPESTATUS[0]}

    - name: Extract Errors
      if: failure()
      run: |
        {
          echo "### Errors"
          echo '```'
          grep -i -E "FAILURE:|BUILD FAILED|A failure occurred|Could not isolate" build.log | head -30
          echo ''
          echo '--- tail 80 ---'
          tail -80 build.log
          echo '```'
        } >> $GITHUB_STEP_SUMMARY

    - name: Upload Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Mark Failed
      if: steps.build.outcome == 'failure'
      run: exit 1

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: CupsPrintClient-Debug-APK
        path: build/app/outputs/flutter-apk/app-debug.apk

    - uses: softprops/action-gh-release@v2
      if: success() && startsWith(github.ref, 'refs/tags/')
      with:
        files: build/app/outputs/flutter-apk/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
